name: ambulance_v2
description: Emergency Ambulance Response System v2 — ML-powered accident detection with TFLite + Gemini Flash hotspot intelligence.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.1

  # State Management
  provider: ^6.1.1
  flutter_bloc: ^9.1.1

  # IoT & Real-time Communication
  mqtt_client: ^10.2.0
  web_socket_channel: ^3.0.3

  # Location & Maps
  geolocator: ^14.0.2
  google_maps_flutter: ^2.5.3
  url_launcher: ^6.2.4

  # Firebase Services
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  google_sign_in: ^6.2.1
  firebase_messaging: ^16.1.1
  firebase_database: ^12.1.3
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.3.0

  # ML & AI
  tflite_flutter: ^0.10.4
  google_generative_ai: ^0.4.3

  # Local Database
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  path: ^1.8.3

  # Network & API
  http: ^1.2.0
  dio: ^5.4.0
  connectivity_plus: ^7.0.0

  # Utilities
  uuid: ^4.3.3
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  equatable: ^2.0.5
  jwt_decoder: ^2.0.1
  json_annotation: ^4.8.1

  # Animations & UI Effects
  lottie: ^3.0.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  # Permissions
  permission_handler: ^12.0.1

  # Image Handling
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # Charts & Visualization
  fl_chart: ^1.1.1

  # Security
  flutter_secure_storage: ^10.0.0
  encrypt: ^5.0.3

  # Logging
  logger: ^2.0.2

  # Supabase (Cold Path - Historical Analytics)
  supabase_flutter: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  mockito: ^5.4.4
  build_runner: ^2.4.8
  bloc_test: ^10.0.0
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1A237E"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/
    - assets/animations/
    - assets/icons/
    - assets/models/
